# DragonClaw — Nginx Configuration
# Place in: /etc/nginx/sites-available/dragonclaw.asia
# Symlink: ln -s /etc/nginx/sites-available/dragonclaw.asia /etc/nginx/sites-enabled/
#
# This config does NOT touch the default server block or other site configs.
# It only claims the dragonclaw.asia domain.

# Rate limiting zone (shared across workers)
limit_req_zone $binary_remote_addr zone=dc_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=dc_web:10m rate=60r/m;

# Upstream for the DragonClaw gateway
upstream dragonclaw_backend {
    server 127.0.0.1:18789;
    keepalive 8;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name dragonclaw.asia www.dragonclaw.asia;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dragonclaw.asia www.dragonclaw.asia;

    # SSL certs (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/dragonclaw.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dragonclaw.asia/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/dragonclaw.asia/chain.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/html image/svg+xml;
    gzip_min_length 1000;

    # ── Static landing page ──
    root /opt/dragonclaw/web;
    index index.html;

    location / {
        limit_req zone=dc_web burst=20 nodelay;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(css|js|svg|png|jpg|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API reverse proxy ──
    location /api/ {
        limit_req zone=dc_api burst=10 nodelay;

        # Strip /api prefix
        rewrite ^/api/(.*) /$1 break;

        proxy_pass http://dragonclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for LLM calls (can take 30-60s)
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;

        # Limit request body (prevent abuse)
        client_max_body_size 64k;
    }

    # ── WebSocket reverse proxy ──
    location /ws {
        limit_req zone=dc_api burst=5 nodelay;

        proxy_pass http://dragonclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket timeout (keep alive)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Health check (no rate limit) ──
    location = /health {
        proxy_pass http://dragonclaw_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Block common scanners
    location ~ /\. { deny all; }
    location ~* (wp-admin|wp-login|xmlrpc|phpmyadmin) { return 444; }
}
